<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Soal ASAJ PAI</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
        }

        .option-btn {
            transition: all 0.2s;
        }

        .option-btn:hover {
            transform: translateX(4px);
        }

        .option-btn.selected {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .option-btn.correct {
            border-color: #16a34a;
            background: #f0fdf4;
        }

        .option-btn.wrong {
            border-color: #dc2626;
            background: #fef2f2;
        }

        .progress-fill {
            transition: width 0.3s ease;
        }
    </style>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
    <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
</head>

<body data-template-id="__page-root" class="w-full min-h-screen">
    <header class="w-full border-b border-emerald-200 px-4 py-5">
        <div class="max-w-3xl mx-auto text-center">
            <h1 data-template-id="main-title" class="canva-text font-bold"></h1>
            <p data-template-id="subtitle" class="canva-text mt-1"></p>
        </div>
    </header>
    <main class="max-w-3xl mx-auto px-4 py-6">
        <!-- Student Info Form -->
        <div id="student-form" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h2 data-template-id="form-title" class="canva-text font-bold mb-4"></h2>
            <div class="mb-4">
                <label data-template-id="label-name" for="student-name"
                    class="canva-text block mb-1 font-medium"></label> <input id="student-name" type="text"
                    class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400"
                    required>
            </div>
            <div class="mb-4">
                <label data-template-id="label-school" for="student-school"
                    class="canva-text block mb-1 font-medium"></label> <input id="student-school" type="text"
                    class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400"
                    required>
            </div>
            <p id="form-error" class="text-red-600 text-sm mb-3 hidden">Harap isi nama lengkap dan nama sekolah.</p>
            <button data-template-id="start-button" class="canva-button w-full px-5 py-3 rounded-lg font-medium"
                onclick="startQuiz()"></button>
        </div><!-- Quiz Area (hidden initially) -->
        <div id="quiz-area" class="hidden">
            <div class="mb-2 text-sm text-gray-600" id="student-info-display"></div>
            <div class="mb-4 flex items-center gap-3">
                <div class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                    <div id="progress-bar" class="progress-fill h-full bg-emerald-500 rounded-full" style="width:2.5%">
                    </div>
                </div><span id="progress-text" class="text-sm font-medium text-gray-600">1/40</span>
            </div>
            <div id="question-area" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-4">
                <p id="question-number" class="text-sm font-medium text-emerald-600 mb-2"></p>
                <p id="question-text" class="text-lg font-medium text-gray-900 mb-4 leading-relaxed" dir="auto"
                    style="white-space:pre-line"></p>
                <div id="options-container"></div><textarea id="essay-input"
                    class="hidden w-full border border-gray-300 rounded-lg p-3 mt-2 min-h-[120px] focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400"
                    placeholder="Tulis jawaban kamu di sini..."></textarea>
                <div id="explanation-panel" class="hidden mt-4 p-4 rounded-lg border-l-4">
                    <div id="answer-status" class="text-sm font-semibold mb-2"></div>
                    <div id="explanation-text" class="text-sm text-gray-700 leading-relaxed"></div>
                </div>
            </div>
            <p id="answer-error" class="text-red-600 text-sm mb-3 hidden">Harap jawab soal terlebih dahulu sebelum
                melanjutkan.</p>
            <div class="flex justify-end items-center">
                <button id="next-btn" onclick="navigate()"
                    class="px-4 py-2 rounded-lg bg-emerald-600 text-white hover:bg-emerald-700 flex items-center gap-1">
                    Selanjutnya <i data-lucide="chevron-right" style="width:18px;height:18px"></i> </button> <button
                    id="submit-btn" onclick="submitQuiz()"
                    class="hidden px-5 py-2 rounded-lg bg-emerald-600 text-white hover:bg-emerald-700 font-medium">
                    Selesai &amp; Lihat Nilai </button>
            </div>
            <div id="result-panel"
                class="hidden mt-6 bg-white rounded-xl shadow-sm border border-gray-100 p-6 text-center">
                <h2 data-template-id="result-title" class="canva-text font-bold mb-2"></h2>
                <p id="score-display" class="text-4xl font-bold text-emerald-600 mb-2"></p>
                <p id="score-detail" class="text-gray-600 mb-4"></p><button onclick="resetQuiz()"
                    class="px-5 py-2 rounded-lg border border-emerald-600 text-emerald-600 hover:bg-emerald-50 font-medium">Ulangi
                    Latihan</button>
            </div>
        </div>
    </main>
    <footer class="w-full border-t border-gray-200 bg-white mt-12 py-4">
        <div class="max-w-3xl mx-auto px-4 text-center">
            <p data-template-id="footer-text" class="canva-text text-sm text-gray-600"></p>
        </div>
    </footer>
    <script src="/_sdk/editing_sdk.js"></script>
    <script>
        const questions = [{ q: 'Perhatikan penggalan ayat berikut!\n"إِنَّ أَكْرَمَكُمْ عِندَ اللَّهِ أَتْقَاكُمْ"\nArti penggalan ayat yang bergaris bawah adalah ....', o: ['manusia yang paling kaya', 'manusia yang paling mulia di sisi Allah adalah yang bertakwa', 'manusia diciptakan bersuku-suku', 'Allah Maha Mengetahui'], a: 1 }, { q: 'Indonesia memiliki beragam suku dan budaya. Sikap yang sesuai dengan pesan Q.S. Al-Hujurat ayat 13 adalah ....', o: ['mengejek budaya daerah lain', 'merasa sukunya paling hebat', 'saling menghormati dan hidup rukun', 'memilih teman dari suku yang sama'], a: 2 }, { q: 'Perilaku yang sesuai dengan hadis tentang persaudaraan sesama manusia adalah ....', o: ['membenci teman berbeda pendapat', 'membantu teman yang kesulitan', 'memutus hubungan dengan tetangga', 'mengejek kekurangan orang lain'], a: 1 }, { q: 'Perhatikan potongan Surah Al-Kafirun berikut!\n"لَكُمْ دِينُكُمْ وَلِيَ دِينِ"\nHukum bacaan pada kata "وَلِيَ" adalah ....', o: ['ikhfa', 'idgham', 'mad thabi\'i', 'qalqalah'], a: 2 }, { q: 'Perhatikan perilaku berikut!\n1) Menghardik anak yatim\n2) Rajin membantu fakir miskin\n3) Enggan memberi makan orang miskin\n4) Menolong teman tanpa pamrih\n\nCiri pendusta agama sesuai Surah Al-Ma\'un ditunjukkan oleh nomor ....', o: ['1 dan 3', '2 dan 4', '1 dan 2', '3 dan 4'], a: 0 }, { q: 'Arti ayat "Qul huwallahu ahad" adalah ....', o: ['Allah tempat meminta', 'Allah tidak beranak', 'Katakanlah Allah Maha Esa', 'tidak ada yang setara dengan-Nya'], a: 2 }, { q: 'Dua siswa bertengkar karena saling mengejek. Sikap yang tepat sesuai hadis tentang kasih sayang adalah ....', o: ['membiarkan pertengkaran', 'ikut memihak salah satu teman', 'mendamaikan dan saling memaafkan', 'menjauhi keduanya'], a: 2 }, { q: 'Allah Swt. berdiri sendiri dan tidak membutuhkan bantuan makhluk-Nya. Asmaulhusna yang sesuai adalah ....', o: ['Al-Gaffar', 'Al-Qayyum', 'As-Samad', 'Al-Afuw'], a: 1 }, { q: 'Asmaulhusna "Al-Gaffar" berarti ....', o: ['Maha Esa', 'Maha Pengampun', 'Maha Berdiri Sendiri', 'Maha Tempat Meminta'], a: 1 }, { q: 'Berikut yang termasuk tanda kiamat sugra adalah ....', o: ['matahari terbit dari barat', 'turunnya Nabi Isa a.s.', 'banyak terjadi gempa bumi', 'ditiupnya sangkakala'], a: 2 }, { q: 'Perilaku yang mencerminkan hikmah beriman kepada hari akhir dalam kehidupan bertetangga adalah ....', o: ['suka memfitnah tetangga', 'membantu tetangga yang kesulitan', 'membuang sampah di rumah tetangga', 'tidak peduli lingkungan sekitar'], a: 1 }, { q: 'Kelahiran dan kematian termasuk contoh ....', o: ['takdir muallaq', 'takdir mubram', 'usaha manusia', 'ikhtiar manusia'], a: 1 }, { q: 'Rina bercita-cita menjadi dokter. Ia belajar dengan rajin dan berdoa kepada Allah. Sikap tersebut menunjukkan iman kepada ....', o: ['takdir mubram', 'qada', 'takdir muallaq', 'kiamat kubra'], a: 2 }, { q: 'Pasangan Asmaulhusna dan artinya yang tepat adalah ....', o: ['Al-Wahid = Maha Pengampun', 'As-Samad = Maha Esa', 'Al-Afuw = Maha Pemaaf', 'Al-Qayyum = Maha Penyayang'], a: 2 }, { q: 'Orang yang beriman kepada hari akhir akan ....', o: ['bebas berbuat sesuka hati', 'takut berbuat dosa', 'malas beribadah', 'meremehkan orang lain'], a: 1 }, { q: 'Adab berdoa yang benar adalah ....', o: ['sambil bercanda', 'menghadap kiblat dan khusyuk', 'berteriak keras', 'tergesa-gesa'], a: 1 }, { q: 'Tetangga sebelah rumah sedang sakit. Sikap yang tepat adalah ....', o: ['membiarkannya', 'mengejeknya', 'menjenguk dan membantu', 'menghindarinya'], a: 2 }, { q: 'Di sekolah terdapat teman berbeda agama. Sikap yang tepat adalah ....', o: ['memaksakan keyakinan', 'menghina ibadahnya', 'menghormati dan bertoleransi', 'menjauhinya'], a: 2 }, { q: 'Menyayangi hewan merupakan bentuk ....', o: ['kesombongan', 'syukur kepada Allah', 'pemborosan', 'kemalasan'], a: 1 }, { q: 'Cara menjaga tumbuhan di lingkungan sekolah adalah ....', o: ['mencabut tanaman sembarangan', 'menginjak rumput', 'menyiram tanaman secara rutin', 'membuang sampah di taman'], a: 2 }, { q: 'Dua teman berselisih karena salah paham. Solusi yang tepat adalah ....', o: ['saling mengejek', 'berkelahi', 'bermusyawarah dan saling memaafkan', 'tidak saling menyapa selamanya'], a: 2 }, { q: 'Perbedaan zakat fitrah dan zakat mal yang benar adalah ....', o: ['zakat fitrah wajib setiap hari', 'zakat mal berupa beras', 'zakat fitrah dibayar saat Ramadan', 'zakat mal hanya untuk anak yatim'], a: 2 }, { q: 'Memberikan uang untuk pembangunan masjid termasuk ....', o: ['sedekah', 'infak', 'hadiah', 'hibah'], a: 1 }, { q: 'Puasa sunah yang dilaksanakan pada tanggal 9 Dzulhijjah adalah puasa ....', o: ['Arafah', 'Asyura', 'Senin Kamis', 'Daud'], a: 0 }, { q: 'Yang termasuk golongan penerima zakat adalah ....', o: ['orang kaya', 'fakir dan miskin', 'pedagang sukses', 'pejabat'], a: 1 }, { q: 'Guru memberikan hadiah kepada siswa berprestasi. Hukum memberi hadiah adalah ....', o: ['haram', 'makruh', 'boleh dan dianjurkan', 'wajib'], a: 2 }, { q: 'Makanan yang halal dikonsumsi adalah makanan yang ....', o: ['diperoleh dengan mencuri', 'mengandung racun', 'bersih dan baik', 'berasal dari hewan haram'], a: 2 }, { q: 'Makanan haram karena cara memperolehnya disebut haram ....', o: ['dzatihi', 'lighairihi', 'mutlak', 'syubhat'], a: 1 }, { q: 'Salah satu alasan Nabi Muhammad saw. hijrah ke Madinah adalah ....', o: ['ingin berdagang', 'menghindari tekanan kaum Quraisy', 'mencari kekayaan', 'ingin berwisata'], a: 1 }, { q: 'Nilai yang terkandung dalam Piagam Madinah adalah ....', o: ['permusuhan', 'perpecahan', 'toleransi dan persatuan', 'kesombongan'], a: 2 }, { q: 'Sifat teladan Abu Bakar as-Siddiq yang dapat diterapkan saat ini adalah ....', o: ['keras kepala', 'tegas dan jujur', 'sombong', 'pemalas'], a: 1 }, { q: 'Jasa besar Umar bin Khattab dalam bidang pemerintahan adalah ....', o: ['membangun Ka\'bah', 'menyusun administrasi negara', 'memimpin perang Badar', 'membuat kitab hadis'], a: 1 }, { q: 'Kedermawanan Utsman bin Affan memberikan dampak ....', o: ['umat Islam semakin lemah', 'masyarakat menjadi sengsara', 'membantu kebutuhan umat Islam', 'menimbulkan permusuhan'], a: 2 }, { q: 'Ali bin Abi Thalib dikenal sebagai ....', o: ['ahli perdagangan', 'Pintu Ilmu dan pemberani', 'penulis wahyu pertama', 'sahabat terkaya'], a: 1 }, { q: 'Sikap Nabi Muhammad saw. saat Fathu Makkah mengajarkan kita untuk ....', o: ['membalas dendam', 'sombong kepada musuh', 'memaafkan kesalahan orang lain', 'menghina lawan'], a: 2 }, { q: 'Tuliskan 3 langkah nyata untuk menciptakan kerukunan di lingkungan masyarakat sesuai pesan Q.S. Al-Hujurat ayat 13!', essay: true, sample: 'Menghormati perbedaan, saling tolong-menolong, dan menjaga persatuan.' }, { q: 'Bagaimana perilaku yang mencerminkan sikap sabar dan syukur dalam menghadapi takdir Allah Swt.?', essay: true, sample: 'Tetap sabar saat mendapat musibah dan bersyukur saat mendapat nikmat.' }, { q: 'Jelaskan sikap tawakal yang benar setelah seseorang berikhtiar dengan sungguh-sungguh!', essay: true, sample: 'Berusaha dengan sungguh-sungguh lalu menyerahkan hasilnya kepada Allah Swt.' }, { q: 'Jelaskan hikmah zakat dan sedekah bagi kehidupan masyarakat!', essay: true, sample: 'Membantu orang yang membutuhkan, mengurangi kesenjangan sosial, dan mempererat persaudaraan.' }, { q: 'Tuliskan salah satu strategi kepemimpinan Khulafaurasyidin dalam menghadapi tantangan umat Islam!', essay: true, sample: 'Menegakkan keadilan dan mengutamakan musyawarah dalam menyelesaikan masalah umat.' }];

        let current = 0, answers = new Array(40).fill(null), submitted = false;
        const labels = ['A', 'B', 'C', 'D'];

        function startQuiz() {
            const name = document.getElementById('student-name').value.trim();
            const school = document.getElementById('student-school').value.trim();
            if (!name || !school) { document.getElementById('form-error').classList.remove('hidden'); return; }
            document.getElementById('form-error').classList.add('hidden');
            document.getElementById('student-form').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('student-info-display').textContent = `${name} — ${school}`;
            render();
        }

        function render() {
            const q = questions[current];
            const isEssay = !!q.essay;
            document.getElementById('question-number').textContent = isEssay ? `Uraian ${current - 34}/5` : `Pilihan Ganda ${current + 1}/35`;
            document.getElementById('question-text').textContent = q.q;
            document.getElementById('progress-bar').style.width = ((current + 1) / 40 * 100) + '%';
            document.getElementById('progress-text').textContent = `${current + 1}/40`;

            const optC = document.getElementById('options-container');
            const essayIn = document.getElementById('essay-input');
            const explPanel = document.getElementById('explanation-panel');

            if (isEssay) {
                optC.classList.add('hidden'); essayIn.classList.remove('hidden');
                essayIn.value = answers[current] || ''; essayIn.disabled = submitted;
                if (submitted) {
                    essayIn.value = answers[current] || '(Tidak dijawab)';
                    explPanel.classList.remove('hidden');
                    explPanel.classList.add('bg-blue-50');
                    explPanel.classList.remove('bg-green-50', 'bg-red-50');
                    const statusEl = document.getElementById('answer-status');
                    statusEl.textContent = '📝 Soal Uraian';
                    statusEl.classList.remove('text-green-700', 'text-red-700');
                    statusEl.classList.add('text-blue-700');
                    document.getElementById('explanation-text').textContent = 'Contoh jawaban: ' + q.sample;
                } else {
                    explPanel.classList.add('hidden');
                }
            } else {
                essayIn.classList.add('hidden'); optC.classList.remove('hidden'); optC.innerHTML = '';
                q.o.forEach((opt, i) => {
                    const btn = document.createElement('button'); btn.type = 'button';
                    btn.className = 'option-btn w-full text-left p-3 mb-2 border-2 rounded-lg flex items-start gap-3';
                    let extra = '';
                    if (submitted) {
                        if (i === q.a) extra = ' correct';
                        else if (answers[current] === i) extra = ' wrong';
                        btn.disabled = true;
                    }
                    else if (answers[current] === i) extra = ' selected';
                    btn.className += extra;
                    btn.innerHTML = `<span class="font-semibold text-gray-500 min-w-[24px]">${labels[i]}.</span><span>${opt}</span>`;
                    if (!submitted) btn.onclick = () => { answers[current] = i; render(); document.getElementById('answer-error').classList.add('hidden'); };
                    optC.appendChild(btn);
                });
                if (submitted) {
                    explPanel.classList.remove('hidden');
                    const isCorrect = answers[current] === q.a;
                    if (isCorrect) {
                        explPanel.classList.add('bg-green-50', 'border-green-500');
                        explPanel.classList.remove('bg-red-50', 'border-red-500');
                        document.getElementById('answer-status').textContent = '✓ Jawaban Benar';
                        document.getElementById('answer-status').classList.add('text-green-700');
                        document.getElementById('answer-status').classList.remove('text-red-700');
                    } else {
                        explPanel.classList.add('bg-red-50', 'border-red-500');
                        explPanel.classList.remove('bg-green-50', 'border-green-500');
                        document.getElementById('answer-status').textContent = '✗ Jawaban Salah';
                        document.getElementById('answer-status').classList.add('text-red-700');
                        document.getElementById('answer-status').classList.remove('text-green-700');
                    }
                    document.getElementById('explanation-text').textContent = 'Jawaban yang benar adalah: ' + labels[q.a] + '. ' + q.o[q.a];
                } else {
                    explPanel.classList.add('hidden');
                }
            }

            const nextBtn = document.getElementById('next-btn');
            const subBtn = document.getElementById('submit-btn');
            if (current === 39) { nextBtn.classList.add('hidden'); if (!submitted) subBtn.classList.remove('hidden'); else subBtn.classList.add('hidden'); }
            else { nextBtn.classList.remove('hidden'); subBtn.classList.add('hidden'); }
        }

        function navigate() {
            saveEssay();
            // Validate answer
            const q = questions[current];
            if (q.essay) {
                if (!document.getElementById('essay-input').value.trim()) { document.getElementById('answer-error').classList.remove('hidden'); return; }
            } else {
                if (answers[current] === null) { document.getElementById('answer-error').classList.remove('hidden'); return; }
            }
            document.getElementById('answer-error').classList.add('hidden');
            current = Math.min(39, current + 1);
            render();
        }

        function saveEssay() { if (questions[current].essay) { const v = document.getElementById('essay-input').value.trim(); answers[current] = v || null; } }

        function submitQuiz() {
            saveEssay();
            const q = questions[current];
            if (q.essay && !document.getElementById('essay-input').value.trim()) { document.getElementById('answer-error').classList.remove('hidden'); return; }
            if (!q.essay && answers[current] === null) { document.getElementById('answer-error').classList.remove('hidden'); return; }
            submitted = true;
            let correct = 0; for (let i = 0; i < 35; i++) { if (answers[i] === questions[i].a) correct++; }
            const score = Math.round(correct / 35 * 100);
            document.getElementById('score-display').textContent = score + ' / 100';
            document.getElementById('score-detail').textContent = `Benar: ${correct}/35 soal pilihan ganda. Soal uraian dinilai oleh guru.`;
            document.getElementById('result-panel').classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            render();
        }

        function resetQuiz() {
            submitted = false; current = 0; answers = new Array(40).fill(null);
            document.getElementById('result-panel').classList.add('hidden');
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('student-form').classList.remove('hidden');
            document.getElementById('student-name').value = '';
            document.getElementById('student-school').value = '';
        }

        document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });
    </script>
